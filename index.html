<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EagleEye+</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0d12;--card:#13141b;--card2:#181920;--hover:#1e2030;
  --border:#222438;--border2:#2a2d42;
  --text:#cdd0e0;--muted:#6b7094;--dim:#3d4060;
  --accent:#f59e0b;--accent2:#fbbf24;
  --purple:#8b5cf6;--green:#10b981;--red:#ef4444;--blue:#3b82f6;
  --orange:#f97316;--pink:#ec4899;--cyan:#06b6d4;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
select option{background:var(--card);color:var(--text)}
.mono{font-family:var(--mono)}

/* ═══ HEADER ═══ */
.header{height:44px;background:#0a0b10;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;z-index:50;position:relative}
.header h1{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--accent);letter-spacing:-0.5px}
.hdr-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.hdr-btn{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid var(--border);cursor:pointer;font-family:var(--mono);background:transparent;color:var(--muted);transition:all .15s}
.hdr-btn:hover{background:var(--hover);color:var(--text)}
.hdr-btn.active{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.3);color:#a78bfa}
.hdr-back{display:none}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.db-dot.ok{background:var(--green)}
.db-dot.err{background:var(--red)}
.user-badge{display:none;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);font-size:10px;font-weight:600;color:var(--accent);font-family:var(--mono)}
.login-btn{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);display:flex;align-items:center;gap:5px}
.login-btn img{width:12px;height:12px}

/* ═══ VERSION BAR ═══ */
.ver-bar{display:none;height:34px;background:#0e0f15;border-bottom:1px solid var(--border);padding:0 14px;align-items:center;gap:6px;overflow-x:auto}
.ver-bar.show{display:flex}
.ver-pill{padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--mono);border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap}
.ver-pill:hover{border-color:var(--muted)}
.ver-pill.active{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.35);color:#a78bfa}
.ver-pill.frozen{opacity:.7}
.ver-pill .st{font-size:7px;margin-left:3px;vertical-align:middle}
.ver-actions{margin-left:auto;display:flex;gap:5px;flex-shrink:0}

/* ═══ PAGES ═══ */
.page{display:none;min-height:calc(100vh - 44px);overflow-y:auto}
.page.show{display:flex;flex-direction:column;align-items:center}

/* Home */
.home-hero{text-align:center;padding-top:60px;margin-bottom:32px}
.home-logo{font-size:44px;font-weight:900;color:var(--accent);font-family:var(--mono);letter-spacing:-2px}
.home-sub{font-size:13px;color:var(--muted);margin-top:6px}
.section-lbl{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;max-width:800px;width:100%;padding:0 20px 40px}
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.proj-card-bar{position:absolute;top:0;left:0;right:0;height:3px}
.proj-card h3{font-size:15px;font-weight:700;margin-bottom:4px}
.proj-card p{font-size:11px;color:var(--muted);line-height:1.4}
.proj-card .cnt{font-size:9px;color:var(--dim);font-family:var(--mono);margin-top:8px}
.add-card{border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px}
.add-card:hover{border-color:var(--accent);color:var(--accent)}

/* Assemblies */
.asm-header{padding:24px 20px 16px;max-width:800px;width:100%;display:flex;align-items:center;gap:12px}
.asm-header-icon{font-size:36px}
.asm-header h2{font-size:20px;font-weight:800}
.asm-header p{font-size:11px;color:var(--muted)}
.asm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;max-width:800px;width:100%;padding:0 20px 40px}
.asm-card{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;text-align:center}
.asm-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.asm-card h4{font-size:14px;font-weight:700;margin-bottom:4px}
.asm-card .cnt{font-size:10px;color:var(--muted);font-family:var(--mono)}

/* ═══ TREE PAGE ═══ */
.tree-page{display:none;height:calc(100vh - 44px);overflow:hidden}
.tree-page.show{display:flex;flex-direction:column}
.tree-page.has-verbar{height:calc(100vh - 78px)}
.tree-wrap{flex:1;display:flex;overflow:hidden}
.tree-container{flex:1;position:relative;overflow:hidden;background:#fafafa}
.tree-container svg{width:100%;height:100%}

/* Side Panel */
.side-panel{width:0;overflow:hidden;border-left:1px solid var(--border);background:var(--card);transition:width .2s;display:flex;flex-direction:column}
.side-panel.open{width:320px}
.sp-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sp-hdr span{font-size:13px;font-weight:700}
.sp-close{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
.sp-body{flex:1;overflow-y:auto;padding:12px 14px}
.sp-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end}
.sp-btn{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--mono);border:none}
.sp-btn-primary{background:var(--accent);color:#000}
.sp-btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.sp-btn-secondary{background:var(--hover);color:var(--muted);border:1px solid var(--border)}

/* Tree Toolbar */
.tree-toolbar{height:36px;background:#0e0f15;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:4px}
.tb-btn{padding:3px 8px;border-radius:5px;font-size:9px;font-weight:700;border:1px solid var(--border);cursor:pointer;font-family:var(--mono);background:transparent;color:var(--muted)}
.tb-btn:hover{background:var(--hover)}
.tb-btn.active{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.25);color:#60a5fa}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 2px}

/* Legend */
.legend{display:none;position:absolute;bottom:8px;left:8px;padding:4px 10px;background:rgba(255,255,255,.92);border:1px solid #ddd;border-radius:6px;font-size:8px;color:#666;font-family:var(--mono);display:flex;gap:6px;flex-wrap:wrap;z-index:5}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-swatch{width:8px;height:8px;border-radius:2px}

/* Zoom Controls */
.zoom-ctrl{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:3px;z-index:5}
.zoom-btn{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.92);border:1px solid #ddd;cursor:pointer;font-size:14px;font-family:var(--mono);display:flex;align-items:center;justify-content:center;color:#555}
.zoom-btn:hover{background:#fff;border-color:#aaa}

/* ═══ BOM OVERLAY ═══ */
.bom-overlay{display:none;position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.6);backdrop-filter:blur(3px)}
.bom-overlay.show{display:flex;align-items:center;justify-content:center}
.bom-panel{width:min(900px,94vw);max-height:88vh;background:var(--card);border-radius:14px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.bom-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.bom-hdr h3{font-size:15px;font-weight:800;flex:1}
.bom-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.bom-body{flex:1;overflow-y:auto;padding:0}
.bom-table{width:100%;border-collapse:collapse;font-size:11px}
.bom-table th{background:var(--card2);padding:6px 10px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;position:sticky;top:0}
.bom-table td{padding:5px 10px;border-top:1px solid var(--border)}
.bom-grp-row{background:var(--card2);font-weight:700}

/* ═══ MODAL ═══ */
.modal-overlay{display:none;position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:14px;width:min(440px,92vw);border:1px solid var(--border);overflow:hidden}
.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--border);font-size:15px;font-weight:700}
.modal-body{padding:16px 18px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.form-group{margin-bottom:12px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.form-input,.form-select,.form-textarea{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-family:var(--mono);outline:none}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-textarea{min-height:60px;resize:vertical;font-family:var(--sans)}
.btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:var(--mono)}
.btn-primary{background:var(--accent);color:#000}
.btn-secondary{background:var(--hover);color:var(--muted);border:1px solid var(--border)}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}

/* ═══ CONTEXT MENU ═══ */
.ctx-menu{position:fixed;z-index:100;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 0;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.ctx-item{padding:6px 14px;font-size:11px;cursor:pointer;color:var(--text)}
.ctx-item:hover{background:var(--hover)}
.ctx-item.danger{color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}

/* Node Action Bar */
.nab{display:none;position:absolute;z-index:30;background:rgba(255,255,255,.96);border:1px solid #ddd;border-radius:8px;padding:4px;gap:2px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.nab.show{display:flex}
.nab-btn{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;background:transparent}
.nab-btn:hover{background:#f0f0f0}
.nab-add{color:#10b981}.nab-edit{color:#3b82f6}.nab-link{color:#f59e0b}.nab-del{color:#ef4444}

/* ═══ TOAST ═══ */
.toast-wrap{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:4px;align-items:center}
.toast{padding:6px 16px;border-radius:6px;font-weight:700;font-size:10px;font-family:var(--mono);max-width:360px;text-align:center;animation:toastIn .2s}
.toast-ok{background:var(--green);color:#fff}
.toast-err{background:var(--red);color:#fff}
.toast-info{background:var(--blue);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══ ADMIN-ONLY ═══ */
.admin-only{display:none}
body.is-admin .admin-only{display:inline-flex}

/* ═══ SELECT MODE ═══ */
.sel-bar{display:none;position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:30;
  background:rgba(15,15,25,.95);border:1px solid var(--border2);border-radius:10px;
  padding:6px 12px;gap:8px;align-items:center;backdrop-filter:blur(8px);
  box-shadow:0 8px 24px rgba(0,0,0,.4)}
.sel-bar.show{display:flex}
.sel-bar-count{font-size:11px;font-weight:700;color:var(--accent);font-family:var(--mono);white-space:nowrap}
.sel-bar-actions{display:flex;gap:4px}
.sel-bar-btn{padding:4px 9px;border-radius:5px;font-size:9px;font-weight:700;border:1px solid var(--border);
  cursor:pointer;font-family:var(--mono);background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap}
.sel-bar-btn:hover{background:var(--hover);color:var(--text)}
.sel-bar-delete{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#f87171}
.sel-bar-delete:hover{background:rgba(239,68,68,.2)}
.sel-bar-clear{color:#94a3b8}
.node-selected .node-shape,.node-selected polygon,.node-selected rect:first-child,.node-selected ellipse{
  stroke:#f59e0b !important;stroke-width:3 !important;stroke-dasharray:6,3}
body.select-mode .node{cursor:crosshair !important}
body.select-mode .tree-container{cursor:crosshair}

/* Loading */
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:40px}

/* Breadcrumb */
.breadcrumb{font-size:11px;color:var(--muted);font-family:var(--mono)}
</style>
</head>
<body>

<!-- ═══════ HEADER ═══════ -->
<div class="header">
  <h1>◈ EagleEye+</h1>
  <button class="hdr-btn hdr-back" id="backBtn" onclick="goBack()">← Back</button>
  <span class="breadcrumb" id="breadcrumb"></span>
  <div class="hdr-right">
    <div class="db-dot" id="dbDot"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"> Sign In
    </button>
    <div class="user-badge" id="userBadge"><span id="userName"></span>
      <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:9px;padding:2px" onclick="doLogout()">✕</button>
    </div>
  </div>
</div>

<!-- ═══════ VERSION BAR ═══════ -->
<div class="ver-bar" id="verBar">
  <span style="font-size:9px;font-weight:700;color:var(--dim);letter-spacing:1px;margin-right:4px" class="mono">VERSIONS</span>
  <div id="verPills"></div>
  <div class="ver-actions">
    <button class="hdr-btn admin-only" onclick="editCurrentVersion()" style="font-size:9px" title="Edit current version">✏️ Edit</button>
    <button class="hdr-btn admin-only" onclick="createNewVersion()" style="font-size:9px">+ New Version</button>
    <button class="hdr-btn admin-only" id="freezeBtn" onclick="toggleFreeze()" style="font-size:9px">🔒 Freeze</button>
  </div>
</div>

<!-- ═══════ HOME PAGE ═══════ -->
<div class="page show" id="homePage">
  <div class="home-hero">
    <div class="home-logo">◈ EagleEye+</div>
    <div class="home-sub">Assembly Tree Builder · Version Control · ECN Tracking</div>
  </div>
  <div style="max-width:800px;width:100%;padding:0 20px"><div class="section-lbl">PROJECTS</div></div>
  <div class="proj-grid" id="projGrid"></div>
</div>

<!-- ═══════ ASSEMBLIES PAGE ═══════ -->
<div class="page" id="asmPage">
  <div class="asm-header" id="asmHeader">
    <span class="asm-header-icon" id="asmIcon">📁</span>
    <div><h2 id="asmTitle">Project</h2><p id="asmDesc">Description</p></div>
  </div>
  <div class="asm-grid" id="asmGrid"></div>
</div>

<!-- ═══════ TREE PAGE ═══════ -->
<div class="tree-page" id="treePage">
  <div class="tree-toolbar" id="treeToolbar">
    <span class="mono" style="font-size:10px;font-weight:700;color:var(--muted)" id="treeTitle">Assembly</span>
    <div class="tb-sep"></div>
    <button class="tb-btn active" id="seqToggle" onclick="toggleSeq()">🔢 Seq</button>
    <button class="tb-btn active" id="partsToggle" onclick="toggleParts()">📦 Parts</button>
    <button class="tb-btn active" id="fastToggle" onclick="toggleFast()">🔩 Fast</button>
    <button class="tb-btn active" id="headersToggle" onclick="toggleHeaders()">📊 Levels</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="openBOM()" style="background:rgba(22,160,133,.08);border-color:rgba(22,160,133,.2);color:#1abc9c">📋 BOM</button>
    <button class="tb-btn admin-only" onclick="document.getElementById('csvFileInput').click()" style="background:rgba(39,174,96,.08);border-color:rgba(39,174,96,.2);color:#27ae60">📥 Import CSV</button>
    <button class="tb-btn" onclick="exportCSV()" style="background:rgba(230,126,34,.08);border-color:rgba(230,126,34,.2);color:#e67e22">📤 Export CSV</button>
    <input type="file" id="csvFileInput" accept=".csv" multiple style="display:none" onchange="handleCSVFiles(event)">
    <div class="tb-sep"></div>
    <button class="tb-btn admin-only" id="selectToggle" onclick="toggleSelectMode()">☐ Select</button>
    <button class="tb-btn admin-only" id="saveBtn" onclick="savePositions()">💾 Save</button>
  </div>
  <div class="tree-wrap">
    <div class="tree-container" id="treeContainer">
      <svg id="treeSvg"></svg>
      <div class="zoom-ctrl">
        <button class="zoom-btn" onclick="doZoomIn()">+</button>
        <button class="zoom-btn" onclick="doZoomOut()">−</button>
        <button class="zoom-btn" onclick="doFit()">⊡</button>
      </div>
      <div class="legend" id="legend"></div>
      <!-- Node Action Bar -->
      <div class="nab" id="nodeActionBar">
        <button class="nab-btn nab-add admin-only" id="nabAdd" title="Add Child">➕</button>
        <button class="nab-btn nab-edit" id="nabEdit" title="Edit">✏️</button>
        <button class="nab-btn nab-link admin-only" id="nabLink" title="Edit Links">🔩</button>
        <button class="nab-btn nab-del admin-only" id="nabDel" title="Delete">🗑️</button>
      </div>
      <!-- Selection Bar -->
      <div class="sel-bar" id="selBar">
        <span class="sel-bar-count" id="selBarCount">0 selected</span>
        <div class="sel-bar-actions">
          <button class="sel-bar-btn" onclick="selectAllOrphans()" title="Select all disconnected nodes">☐ Orphans</button>
          <button class="sel-bar-btn" onclick="selectByLevel()" title="Select all nodes at a level">☐ Level...</button>
          <button class="sel-bar-btn" onclick="invertSelection()">⇄ Invert</button>
          <button class="sel-bar-btn" onclick="selectAll()">☐ All</button>
          <button class="sel-bar-btn sel-bar-clear" onclick="clearSelection()">✕ Clear</button>
          <button class="sel-bar-btn sel-bar-delete" onclick="deleteSelected()">🗑 Delete</button>
        </div>
      </div>
    </div>
    <div class="side-panel" id="sidePanel">
      <div class="sp-hdr"><span id="spTitle">Edit Node</span><button class="sp-close" onclick="closePanel()">×</button></div>
      <div class="sp-body" id="spBody"></div>
      <div class="sp-footer" id="spFooter"></div>
    </div>
  </div>
</div>

<!-- ═══════ BOM OVERLAY ═══════ -->
<div class="bom-overlay" id="bomOverlay">
  <div class="bom-panel">
    <div class="bom-hdr">
      <h3>📋 BOM — <span id="bomTitle"></span></h3>
      <button class="bom-close" onclick="closeBOM()">✕</button>
    </div>
    <div class="bom-body" id="bomBody"></div>
  </div>
</div>

<!-- ═══════ MODAL ═══════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-hdr" id="modalTitle">Confirm</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- ═══════ CONTEXT MENU ═══════ -->
<div id="ctxMenu" class="ctx-menu" style="display:none"></div>

const DB = {
  // Projects
  async loadProjects(){
    const{data,error}=await sb.from('logi_projects').select('*').order('name');

    return data||[];

  // Assemblies

  // Nodes

  // Batch insert nodes — returns array of created nodes with IDs
  async bulkCreateNodes(nodes){

  // Batch insert links

  async updateNode(nodeId, updates){

    return!error;
  },

  async deleteNode(nodeId){
    // Soft delete + remove links
    await sb.from('logi_links').update({deleted:true}).or(`parent_id.eq.${nodeId},child_id.eq.${nodeId}`);
    const{error}=await sb.from('logi_nodes').update({deleted:true}).eq('id',nodeId);
    return!error;
  },

  // Links
  // Links — with fallback for un-migrated data
  async loadLinks(versionId){
    // Primary: load by version_id
    const{data,error}=await sb.from('logi_links').select('*').eq('version_id',versionId);
    if(error)throw error;
    let links=(data||[]).filter(l=>l.deleted!==true);
    
    // Fallback: if no links found by version_id, check for un-migrated links (version_id IS NULL)
    // that belong to the same assembly
    if(links.length===0){
      // Get assembly_id from the version
      const{data:ver}=await sb.from('logi_versions').select('assembly_id').eq('id',versionId).single();
      if(ver){
        const{data:fallback}=await sb.from('logi_links').select('*').eq('assembly_id',ver.assembly_id).is('version_id',null);
        const fbLinks=(fallback||[]).filter(l=>l.deleted!==true);
        if(fbLinks.length>0){
          // Auto-repair: assign version_id to these orphaned links
          console.log('Auto-repairing',fbLinks.length,'links missing version_id');
          for(const l of fbLinks){
            await sb.from('logi_links').update({version_id:versionId}).eq('id',l.id);
            l.version_id=versionId;
          }
          links=fbLinks;
        }
      }
    }
    return links;
  },

  async createLink(link){
    const{data,error}=await sb.from('logi_links').insert(link).select().single();
    if(error)throw error;
    return data;
  },

  async updateLink(linkId, updates){
    const{error}=await sb.from('logi_links').update(updates).eq('id',linkId);
    return!error;
  },

  async deleteLink(linkId){
    const{error}=await sb.from('logi_links').update({deleted:true}).eq('id',linkId);
    return!error;
  },

  // Clone version (nodes + links) — uses batch inserts
  async cloneVersion(sourceVersionId, newVersionId, assemblyId){
    // 1. Load source nodes
    const srcNodes = await this.loadNodes(sourceVersionId);
    if(!srcNodes.length) return { nodesCloned: 0, linksCloned: 0 };
    const srcNodeIds = new Set(srcNodes.map(n=>n.id));
    console.log('[Clone] Source nodes: '+srcNodes.length);
    
    // 2. Load ALL links for this assembly, filter to source nodes
    const{data:rawLinks,error:le}=await sb.from('logi_links').select('*').eq('assembly_id',assemblyId);
    if(le) console.error('[Clone] Link load error:',le);
    const allActive=(rawLinks||[]).filter(l=>l.deleted!==true);
    const srcLinks=allActive.filter(l=>srcNodeIds.has(l.parent_id)&&srcNodeIds.has(l.child_id));
    console.log('[Clone] '+allActive.length+' total links, '+srcLinks.length+' connect source nodes');
    
    // 3. Auto-repair unversioned links
    const unversioned=srcLinks.filter(l=>!l.version_id);
    if(unversioned.length){
      for(const l of unversioned)await sb.from('logi_links').update({version_id:sourceVersionId}).eq('id',l.id);
      console.log('[Clone] Repaired '+unversioned.length+' unversioned links');
    }
    
    // 4. BATCH insert cloned nodes
    const nodeInserts=srcNodes.map(n=>({
      assembly_id:assemblyId, version_id:newVersionId,
      name:n.name, part_number:n.part_number,
      status:n.status||'NOT_STARTED', qty:n.qty||1,
      group_num:n.group_num||0, sequence_num:n.sequence_num||0,
      sequence_tag:n.sequence_tag||null, notes:n.notes||null,
      x:n.x, y:n.y, tree_y:n.tree_y||null,
      is_locked:n.is_locked||false, deleted:false
    }));
    
    const createdNodes=await this.bulkCreateNodes(nodeInserts);
    console.log('[Clone] Batch inserted '+createdNodes.length+' nodes');
    
    // Build ID mapping: old ID → new ID (match by array order)
    const idMap=new Map();
    srcNodes.forEach((orig,i)=>{
      if(i<createdNodes.length) idMap.set(orig.id, createdNodes[i].id);
    });
    // Fallback: match by name
    const nameToOldId=new Map(srcNodes.map(n=>[n.name,n.id]));
    createdNodes.forEach(cn=>{
      const oldId=nameToOldId.get(cn.name);
      if(oldId&&!idMap.has(oldId)) idMap.set(oldId,cn.id);
    });
    
    // 5. BATCH insert cloned links
    const linkInserts=[];
    let skipped=0;
    srcLinks.forEach(l=>{
      const np=idMap.get(l.parent_id), nc=idMap.get(l.child_id);
      if(!np||!nc){skipped++;return}
      linkInserts.push({
        assembly_id:assemblyId, version_id:newVersionId,
        parent_id:np, child_id:nc,
        fastener:l.fastener||null, qty:l.qty||1,
        loctite:l.loctite||null, torque_value:l.torque_value||null,
        torque_unit:l.torque_unit||null, label_position:l.label_position||null,
        deleted:false
      });
    });
    
    let linksCloned=0;
    if(linkInserts.length){
      const createdLinks=await this.bulkCreateLinks(linkInserts);
      linksCloned=createdLinks.length;
    }
    
    console.log('[Clone] DONE: '+createdNodes.length+' nodes, '+linksCloned+' links ('+skipped+' skipped)');
    return { nodesCloned: createdNodes.length, linksCloned };
  },

  // Save node positions
  async savePositions(updates){
    let count=0;
    for(const[id,pos]of Object.entries(updates)){
      const ok = await this.updateNode(id, {x:pos.x, y:pos.y, tree_y:pos.treeY||pos.y});
      if(ok)count++;
    }
    return count;
  }
};

function toast(msg, type='ok'){

function showModal(title, body, buttons){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  const footer=document.getElementById('modalFooter');
  footer.innerHTML='';

    const btn=document.createElement('button');

}

function navigateTo(page){
  S.page=page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById('treePage').classList.remove('show');
  
  const back=document.getElementById('backBtn');
  const bc=document.getElementById('breadcrumb');
  const vb=document.getElementById('verBar');
  
  if(page==='home'){
    document.getElementById('homePage').classList.add('show');
    back.style.display='none';bc.textContent='';vb.classList.remove('show');
  }else if(page==='assemblies'){
    document.getElementById('asmPage').classList.add('show');
    back.style.display='';back.classList.add('hdr-back');back.style.display='inline-flex';
    bc.textContent=S.currentProject?.name||'';vb.classList.remove('show');
  }else if(page==='tree'){
    document.getElementById('treePage').classList.add('show');
    back.style.display='inline-flex';
    bc.textContent=(S.currentProject?.name||'')+' / '+(S.currentAssembly?.name||'');
    vb.classList.add('show');
    document.getElementById('treePage').classList.toggle('has-verbar',true);
  }
}

async function checkAuth(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session?.user)handleUser(session.user);
    sb.auth.onAuthStateChange((ev,sess)=>{
      if(ev==='SIGNED_IN'&&sess?.user)handleUser(sess.user);
      else if(ev==='SIGNED_OUT'){S.isAdmin=false;S.userName='';S.userEmail='';document.body.classList.remove('is-admin');document.getElementById('loginBtn').style.display='';document.getElementById('userBadge').style.display='none'}
    });
  }catch(e){console.error('Auth:',e)}
}

function handleUser(user){
  S.userEmail=user.email||'';
  S.userName=user.user_metadata?.full_name||user.user_metadata?.name||S.userEmail.split('@')[0];
  S.isAdmin=S.userEmail.toLowerCase()===ADMIN_EMAIL.toLowerCase();
  document.body.classList.toggle('is-admin',S.isAdmin);
  document.getElementById('loginBtn').style.display='none';
  document.getElementById('userBadge').style.display='flex';
  document.getElementById('userName').textContent=(S.isAdmin?'🔧 ':'👁 ')+S.userName;
  toast('Welcome, '+S.userName,S.isAdmin?'ok':'info');
}

async function openAssembly(id, name){
  S.currentAssembly=S.assemblies.find(a=>a.id===id)||{id,name};
  document.getElementById('treeTitle').textContent=name||id;
  
  try{
    // Load versions
    S.versions=await DB.loadVersions(id);
    
    // If no versions exist, auto-create v1.0
    if(S.versions.length===0){
      const v=await DB.createVersion(id,'1.0','Initial version');
      await DB.setCurrentVersion(id,v.id);
      S.versions=[v];
      S.currentAssembly.current_version_id=v.id;
    }
    
    // Select current version
    const curVid=S.currentAssembly.current_version_id;
    S.currentVersion=S.versions.find(v=>v.id===curVid)||S.versions[S.versions.length-1];
    
    renderVersionBar();
    await loadTreeData();
    navigateTo('tree');
  }catch(e){console.error(e);toast(e.message,'err')}
}

function renderVersionBar(){
  const pills=document.getElementById('verPills');
  let html='';
  S.versions.forEach(v=>{
    const active=v.id===S.currentVersion?.id;
    const frozen=v.status==='frozen'||v.status==='production';
    const icon=frozen?'🔒':v.status==='production'?'🏭':'✏️';
    html+=`<button class="ver-pill${active?' active':''}${frozen?' frozen':''}" onclick="switchVersion('${v.id}')" ondblclick="event.stopPropagation();editVersion('${v.id}')" title="${active?'Double-click to edit · ':''}${esc(v.notes||'No notes')}">
      v${esc(v.version)} <span class="st">${icon}</span>
    </button>`;
  });
  pills.innerHTML=html;
  
  // Update freeze button
  const fb=document.getElementById('freezeBtn');
  if(S.currentVersion){
    const frozen=S.currentVersion.status==='frozen'||S.currentVersion.status==='production';
    fb.textContent=frozen?'🔓 Unfreeze':'🔒 Freeze';
    fb.style.background=frozen?'rgba(245,158,11,.1)':'';
    fb.style.borderColor=frozen?'rgba(245,158,11,.2)':'';
    fb.style.color=frozen?'#f59e0b':'';
  }
}

async function switchVersion(versionId){
  S.currentVersion=S.versions.find(v=>v.id===versionId);
  if(!S.currentVersion)return;
  await DB.setCurrentVersion(S.currentAssembly.id,versionId);
  renderVersionBar();
  await loadTreeData();
}

async function createNewVersion(){
  const last=S.versions[S.versions.length-1];
  const nextVer=suggestNextVersion(last?.version||'1.0');
  
  showModal('New Version',`
    <div class="form-group"><label class="form-label">Version Number</label><input class="form-input" id="mVerNum" value="${nextVer}" placeholder="e.g. 2.0"></div>
    <div class="form-group"><label class="form-label">Notes (optional)</label><input class="form-input" id="mVerNotes" placeholder="What changed..."></div>
    <div class="form-group"><label class="form-label">Clone from</label>
      <select class="form-select" id="mVerSource">
        ${S.versions.map(v=>`<option value="${v.id}"${v.id===S.currentVersion?.id?' selected':''}>v${esc(v.version)} (${v.status})</option>`).join('')}
        <option value="">Empty (no nodes)</option>
      </select>
    </div>
  `,[
    {label:'Cancel',cls:'btn-secondary',action:hideModal},
    {label:'Create',action:async()=>{
      const ver=document.getElementById('mVerNum').value.trim();
      const notes=document.getElementById('mVerNotes').value.trim();
      const sourceId=document.getElementById('mVerSource').value;
      if(!ver){toast('Version number required','err');return}
      if(S.versions.some(v=>v.version===ver)){toast('Version already exists','err');return}
      
      try{
        hideModal();toast('Creating v'+ver+'...');
        const newVer=await DB.createVersion(S.currentAssembly.id,ver,notes);
        
        // Clone if source selected
        if(sourceId){
          const result=await DB.cloneVersion(sourceId,newVer.id,S.currentAssembly.id);
          if(result.linksCloned===0 && result.nodesCloned>1){
            toast(`⚠️ v${ver}: ${result.nodesCloned} nodes cloned but 0 links — check browser console`,'err');
          }else{
            toast(`v${ver} created (${result.nodesCloned} nodes, ${result.linksCloned} links)`);
          }
        }else{
          toast(`v${ver} created (empty)`);
        }
        
        // Switch to new version
        await DB.setCurrentVersion(S.currentAssembly.id,newVer.id);
        S.versions=await DB.loadVersions(S.currentAssembly.id);
        S.currentVersion=newVer;
        S.currentAssembly.current_version_id=newVer.id;
        renderVersionBar();
        await loadTreeData();
      }catch(e){toast(e.message,'err')}
    }}
  ]);
  setTimeout(()=>document.getElementById('mVerNum')?.focus(),100);
}

async function toggleFreeze(){
  if(!S.currentVersion)return;
  const isFrozen=S.currentVersion.status==='frozen'||S.currentVersion.status==='production';
  const newStatus=isFrozen?'draft':'frozen';
  try{
    await DB.updateVersionStatus(S.currentVersion.id,newStatus);
    S.currentVersion.status=newStatus;
    const v=S.versions.find(x=>x.id===S.currentVersion.id);
    if(v)v.status=newStatus;
    renderVersionBar();
    toast(isFrozen?'Version unfrozen (editable)':'Version frozen (read-only)');
  }catch(e){toast(e.message,'err')}
}

function editCurrentVersion(){if(S.currentVersion)editVersion(S.currentVersion.id)}

async function editVersion(versionId){
  if(!S.isAdmin)return;
  const ver=S.versions.find(v=>v.id===versionId);
  if(!ver)return;
  
  showModal('Edit Version',`
    <div class="form-group"><label class="form-label">Version Number</label><input class="form-input" id="mEditVerNum" value="${esc(ver.version)}"></div>
    <div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="mEditVerNotes" value="${esc(ver.notes||'')}" placeholder="Version notes..."></div>
    <div class="form-group"><label class="form-label">Status</label>
      <select class="form-select" id="mEditVerStatus">
        <option value="draft"${ver.status==='draft'?' selected':''}>✏️ Draft</option>
        <option value="frozen"${ver.status==='frozen'?' selected':''}>🔒 Frozen</option>
        <option value="production"${ver.status==='production'?' selected':''}>🏭 Production</option>
      </select>
    </div>
  `,[
    {label:'Cancel',cls:'btn-secondary',action:hideModal},
    {label:'Delete Version',cls:'btn-danger',action:async()=>{
      if(S.versions.length<=1){toast('Cannot delete the only version','err');return}
      if(!confirm('Delete v'+ver.version+'? All its nodes and links will be permanently removed.'))return;
      try{
        hideModal();toast('Deleting v'+ver.version+'...');
        // Hard delete: links first, then nodes, then version record
        await sb.from('logi_links').delete().eq('version_id',versionId);
        await sb.from('logi_nodes').delete().eq('version_id',versionId);
        await sb.from('logi_versions').delete().eq('id',versionId);
        toast('v'+ver.version+' deleted');
        // Switch to another version
        S.versions=await DB.loadVersions(S.currentAssembly.id);
        S.currentVersion=S.versions[S.versions.length-1];
        if(S.currentVersion){
          await DB.setCurrentVersion(S.currentAssembly.id,S.currentVersion.id);
          S.currentAssembly.current_version_id=S.currentVersion.id;
        }
        renderVersionBar();
        await loadTreeData();
      }catch(e){toast(e.message,'err')}
    }},
    {label:'Save',action:async()=>{
      const newNum=document.getElementById('mEditVerNum').value.trim();
      const newNotes=document.getElementById('mEditVerNotes').value.trim();
      const newStatus=document.getElementById('mEditVerStatus').value;
      if(!newNum){toast('Version number required','err');return}
      // Check for duplicate version number (excluding this one)
      if(newNum!==ver.version&&S.versions.some(v=>v.version===newNum)){toast('Version number already exists','err');return}
      try{
        await DB.updateVersion(versionId,{version:newNum,notes:newNotes||null,status:newStatus});
        ver.version=newNum;ver.notes=newNotes||null;ver.status=newStatus;
        hideModal();renderVersionBar();toast('Version updated');
      }catch(e){toast(e.message,'err')}
    }}
  ]);
  setTimeout(()=>document.getElementById('mEditVerNum')?.focus(),100);
}

function suggestNextVersion(current){
  const parts=current.split('.');
  const major=parseInt(parts[0])||1;
  const minor=parseInt(parts[1])||0;
  return major+'.'+(minor+1);
}

// ============================================================
// TREE DATA LOADING
// ============================================================
async function loadTreeData(){
  if(!S.currentVersion)return;
  try{
    S.nodes=await DB.loadNodes(S.currentVersion.id);
    S.links=await DB.loadLinks(S.currentVersion.id);
    
    // Clear state
    S.collapsedNodes.clear();
    S.lockedNodes.clear();
    
    // Process nodes
    S.nodes.forEach(n=>{
      n.goesInto=[];
      n.receivesFrom=[];
      n.level=-1;
      n.width=calcNodeW(n.name,n.part_number);
      n.height=calcNodeH(n.name,n.part_number);
      if(n.is_locked)S.lockedNodes.add(n.id);
    });
    
    // Build relationships
    const nMap=new Map(S.nodes.map(n=>[n.id,n]));
    S.links.forEach(l=>{
      const child=nMap.get(l.child_id),parent=nMap.get(l.parent_id);
      if(child&&parent){
        if(!child.goesInto.includes(l.parent_id))child.goesInto.push(l.parent_id);
        if(!parent.receivesFrom.includes(l.child_id))parent.receivesFrom.push(l.child_id);
      }
    });
    
    // Calculate levels
    calcLevels();
    
    // Render
    renderTree();
    setTimeout(()=>doFit(),150);
  }catch(e){console.error('loadTree:',e);toast(e.message,'err')}
}

function calcNodeW(name,pn){let w=NODE_W_BASE;if(name&&name.length>12)w=Math.min(NODE_W_MAX,NODE_W_BASE+(name.length-12)*4);if(pn&&pn.length>10)w=Math.max(w,Math.min(NODE_W_MAX,100+pn.length*4));return w}
function calcNodeH(name,pn){let h=36;if(pn)h+=10;if(name&&name.length>20)h+=8;return h}

function calcLevels(){
  S.nodes.forEach(n=>n.level=-1);
  const roots=S.nodes.filter(n=>n.goesInto.length===0);
  if(!roots.length){S.nodes.forEach(n=>n.level=1);return}
  const queue=[],visited=new Set();
  roots.forEach(r=>{r.level=1;queue.push(r.id);visited.add(r.id)});
  while(queue.length){
    const nid=queue.shift();
    const node=S.nodes.find(n=>n.id===nid);
    if(!node)continue;
    node.receivesFrom.forEach(cid=>{
      const child=S.nodes.find(n=>n.id===cid);
      if(child){
        const nl=node.level+1;
        if(child.level===-1||nl>child.level)child.level=nl;
        if(!visited.has(cid)){visited.add(cid);queue.push(cid)}
      }
    });
  }
  S.nodes.forEach(n=>{if(n.level===-1)n.level=1});
}

// ============================================================
// TREE LAYOUT
// ============================================================
let _zoomBehavior=null, _currentTransform=d3.zoomIdentity;

function calcTreeLayout(){
  const nodes=S.nodes.filter(n=>!n.deleted);
  const links=S.links;
  if(!nodes.length)return null;
  
  // Group by level
  const levelGroups={};
  let maxLevel=1;
  nodes.forEach(n=>{
    const l=n.level||1;
    if(!levelGroups[l])levelGroups[l]=[];
    levelGroups[l].push(n);
    maxLevel=Math.max(maxLevel,l);
  });
  
  const nodeW=150, nodeH=48, vGap=68, groupGap=40, headerH=50, leftPad=120, topPad=80;
  const levels=Object.keys(levelGroups).map(Number).sort((a,b)=>b-a);
  
  // Column X positions
  const colXMap={};
  let cumX=leftPad;
  levels.forEach((level,i)=>{
    colXMap[level]=cumX;
    if(i<levels.length-1){
      const nextLvl=levels[i+1];
      const lowerLvl=Math.min(level,nextLvl);
      const gapIdx=lowerLvl-1;
      const gap=LEVEL_GAPS[Math.min(gapIdx,LEVEL_GAPS.length-1)]||150;
      cumX+=gap;
    }
  });
  
  // Build adjacency
  const childToParents={}, parentToChildren={};
  links.forEach(l=>{
    if(!childToParents[l.child_id])childToParents[l.child_id]=[];
    if(!parentToChildren[l.parent_id])parentToChildren[l.parent_id]=[];
    childToParents[l.child_id].push(l.parent_id);
    parentToChildren[l.parent_id].push(l.child_id);
  });
  
  // Detect groups (L2 branches)
  const l2Nodes=nodes.filter(n=>n.level===2);
  const groupRoots=l2Nodes.length?l2Nodes:nodes.filter(n=>n.level===3);
  const groups=[],visited=new Set();
  
  groupRoots.sort((a,b)=>(a.sequence_num||9999)-(b.sequence_num||9999));
  groupRoots.forEach(root=>{
    if(visited.has(root.id))return;
    const group={rootId:root.id,nodeIds:new Set()};
    const q=[root.id];
    while(q.length){
      const nid=q.shift();
      if(group.nodeIds.has(nid))continue;
      group.nodeIds.add(nid);visited.add(nid);
      (parentToChildren[nid]||[]).forEach(cid=>{if(!group.nodeIds.has(cid))q.push(cid)});
    }
    const parents=childToParents[root.id]||[];
    parents.forEach(pid=>{group.nodeIds.add(pid);visited.add(pid)});
    if(group.nodeIds.size)groups.push(group);
  });
  
  const unvisited=nodes.filter(n=>!visited.has(n.id));
  if(unvisited.length){
    if(groups.length)unvisited.forEach(n=>groups[groups.length-1].nodeIds.add(n.id));
    else groups.push({rootId:null,nodeIds:new Set(unvisited.map(n=>n.id))});
  }
  
  // Position nodes
  const pos={};
  const nodeToGroup={};
  groups.forEach((g,gi)=>g.nodeIds.forEach(nid=>nodeToGroup[nid]=gi));
  
  // Initial X
  levels.forEach(level=>{
    (levelGroups[level]||[]).forEach(n=>{
      pos[n.id]={x:colXMap[level],y:0,w:nodeW-20,h:nodeH-10,group:nodeToGroup[n.id]||0};
    });
  });
  
  // Position per group
  let groupStartY=topPad+headerH;
  groups.forEach((group,gi)=>{
    const groupNodesByLevel={};
    levels.forEach(l=>{
      groupNodesByLevel[l]=(levelGroups[l]||[]).filter(n=>group.nodeIds.has(n.id));
    });
    
    levels.forEach(level=>{
      const nlvl=groupNodesByLevel[level]||[];
      if(!nlvl.length)return;
      nlvl.sort((a,b)=>(a.sequence_num||9999)-(b.sequence_num||9999));
      nlvl.forEach((node,idx)=>{
        const children=parentToChildren[node.id]||[];
        const childrenInGrp=children.filter(cid=>group.nodeIds.has(cid));
        if(childrenInGrp.length&&childrenInGrp.some(cid=>pos[cid]?.y>0)){
          const cYs=childrenInGrp.map(cid=>pos[cid].y);
          pos[node.id].y=(Math.min(...cYs)+Math.max(...cYs))/2;
        }else{
          pos[node.id].y=groupStartY+idx*vGap;
        }
      });
      // Fix overlaps
      nlvl.sort((a,b)=>pos[a.id].y-pos[b.id].y);
      let lastY=groupStartY-vGap;
      nlvl.forEach(n=>{
        if(S.lockedNodes.has(n.id)&&n.tree_y!=null){pos[n.id].y=n.tree_y;lastY=Math.max(lastY,pos[n.id].y);return}
        if(pos[n.id].y<lastY+vGap)pos[n.id].y=lastY+vGap;
        lastY=pos[n.id].y;
      });
    });
    
    const gNodes=nodes.filter(n=>group.nodeIds.has(n.id));
    const gYs=gNodes.map(n=>pos[n.id]?.y||0);
    const gMaxY=Math.max(...gYs);
    groupStartY=gMaxY+vGap+groupGap;
  });
  
  // Bidirectional centering passes
  for(let pass=0;pass<4;pass++){
    [...levels].reverse().forEach(level=>{
      (levelGroups[level]||[]).forEach(node=>{
        if(S.lockedNodes.has(node.id))return;
        const children=(parentToChildren[node.id]||[]).filter(cid=>pos[cid]).map(cid=>pos[cid].y);
        if(children.length)pos[node.id].y=(Math.min(...children)+Math.max(...children))/2;
      });
      const nlvl=(levelGroups[level]||[]).sort((a,b)=>pos[a.id].y-pos[b.id].y);
      let lastY2=topPad+headerH-vGap;
      nlvl.forEach(n=>{
        if(S.lockedNodes.has(n.id)){lastY2=Math.max(lastY2,pos[n.id].y);return}
        if(pos[n.id].y<lastY2+vGap)pos[n.id].y=lastY2+vGap;
        lastY2=pos[n.id].y;
      });
    });
  }
  
  const maxColX=Math.max(...Object.values(colXMap));
  const allY=Object.values(pos).map(p=>p.y);
  const totalW=maxColX+leftPad+nodeW;
  const totalH=Math.max(...allY,topPad+headerH)+150;
  
  return{positions:pos,levels,levelGroups,colXMap,dimensions:{width:totalW,height:totalH},settings:{topPad,headerH,leftPad,nodeW},groups};
}

// ============================================================
// TREE RENDERING (D3)
// ============================================================
let _allNodes=[];

function renderTree(){
  const container=document.getElementById('treeContainer');
  const svg=d3.select('#treeSvg');
  svg.selectAll('*').remove();
  
  if(!S.nodes.length){
    svg.attr('width',container.clientWidth).attr('height',container.clientHeight);
    svg.append('text').attr('x',container.clientWidth/2).attr('y',container.clientHeight/2)
      .attr('text-anchor','middle').attr('fill','#999').attr('font-size','14px')
      .text(S.isAdmin?'Click + to add a root node':'No nodes in this assembly');
    return;
  }
  
  const layout=calcTreeLayout();
  if(!layout)return;
  
  const W=container.clientWidth,H=container.clientHeight;
  svg.attr('width',W).attr('height',H);
  
  const visibleNodes=S.nodes.filter(n=>!n.deleted&&isNodeVisible(n));
  const visibleIds=new Set(visibleNodes.map(n=>n.id));
  const visibleLinks=S.links.filter(l=>visibleIds.has(l.parent_id)&&visibleIds.has(l.child_id));
  
  // Apply positions
  visibleNodes.forEach(n=>{
    const p=layout.positions[n.id];
    if(p){n.treeX=p.x;n.treeY=p.y;n.treeWidth=p.w;n.treeHeight=p.h}
  });
  _allNodes=visibleNodes;
  
  // Defs
  const defs=svg.append('defs');
  defs.append('marker').attr('id','arrow').attr('viewBox','0 0 10 10').attr('refX',9).attr('refY',5).attr('orient','auto').attr('markerWidth',5).attr('markerHeight',5)
    .append('path').attr('d','M 0,1 L 8,5 L 0,9 z').attr('fill','#888');
  
  const g=svg.append('g').attr('class','zoom-group');
  _zoomBehavior=d3.zoom().scaleExtent([0.1,3]).on('zoom',e=>{_currentTransform=e.transform;g.attr('transform',e.transform)});
  svg.call(_zoomBehavior);
  
  // Level headers
  if(S.showHeaders){
    layout.levels.forEach(level=>{
      const cx=layout.colXMap[level];
      const hg=g.append('g');
      hg.append('rect').attr('x',cx-50).attr('y',layout.settings.topPad-5).attr('width',100).attr('height',30).attr('rx',5).attr('fill','#3498db').attr('opacity',.85);
      hg.append('text').attr('x',cx).attr('y',layout.settings.topPad+15).attr('text-anchor','middle').attr('fill','white').attr('font-size','12px').attr('font-weight','700').text('L'+level);
    });
  }
  
  // Links
  const linkLayer=g.append('g').attr('class','link-layer');
  visibleLinks.forEach(lk=>{
    const src=visibleNodes.find(n=>n.id===lk.child_id);
    const tgt=visibleNodes.find(n=>n.id===lk.parent_id);
    if(!src||!tgt)return;
    const sx=(src.treeX||src.x)+(src.treeWidth||60)/2, sy=src.treeY||src.y;
    const tx=(tgt.treeX||tgt.x)-(tgt.treeWidth||60)/2, ty=tgt.treeY||tgt.y;
    const midX=(sx+tx)/2;
    const fc=getFastColor(lk.fastener);
    
    const lg=linkLayer.append('g').attr('class','link-group').attr('data-src',lk.child_id).attr('data-tgt',lk.parent_id);
    lg.append('path').attr('class','link-path').attr('d',`M${sx},${sy} C${midX},${sy} ${midX},${ty} ${tx},${ty}`)
      .attr('stroke',fc).attr('stroke-width',1.5).attr('fill','none').attr('opacity',.7).attr('marker-end','url(#arrow)');
    
    // Fastener label
    if(S.showFast&&(lk.fastener||lk.loctite||lk.torque_value)){
      const t=lk.label_position||.5;
      const pathNode=lg.select('path').node();
      const pt=pathNode.getPointAtLength(t*pathNode.getTotalLength());
      const lines=[];
      if(lk.fastener)lines.push({t:lk.fastener+(lk.qty>1?' ×'+lk.qty:''),c:fc,b:true});
      if(lk.loctite)lines.push({t:'LT-'+lk.loctite,c:'#9b59b6',b:false});
      if(lk.torque_value)lines.push({t:lk.torque_value+(lk.torque_unit||'Nm'),c:'#e67e22',b:false});
      const lH=lines.length*12+6, lW=Math.max(55,...lines.map(l=>l.t.length*5.5+14));
      const fg=lg.append('g').attr('class','fast-label').attr('transform',`translate(${pt.x},${pt.y})`).style('cursor','pointer');
      fg.append('rect').attr('x',-lW/2).attr('y',-lH/2).attr('width',lW).attr('height',lH).attr('rx',3).attr('fill','white').attr('stroke','#e5e7eb').attr('stroke-width',.5).attr('opacity',.94);
      lines.forEach((ln,i)=>{
        fg.append('text').attr('x',0).attr('y',-lH/2+10+i*12).attr('text-anchor','middle').attr('fill',ln.c).attr('font-size','8px').attr('font-weight',ln.b?'700':'400').text(ln.t);
      });
      fg.on('click',e=>{e.stopPropagation();if(S.isAdmin&&!S.isFrozen)editLink(lk.id)});
    }
  });
  
  // Nodes
  const nodeLayer=g.append('g').attr('class','node-layer');
  const nodeGs=nodeLayer.selectAll('.node').data(visibleNodes,d=>d.id).enter().append('g').attr('class','node')
    .attr('transform',d=>`translate(${d.treeX||d.x||400},${d.treeY||d.y||300})`);
  
  nodeGs.each(function(d){
    const sel=d3.select(this);
    const color=getLvlColor(d.level);
    const shape=getLvlShape(d.level);
    const nW=d.treeWidth||d.width;
    const nH=d.treeHeight||d.height;
    drawShape(sel,shape,nW,nH,color);
    
    // Status dot
    const sc={'DONE':'#27ae60','IN_PROGRESS':'#f39c12','BLOCKED':'#e74c3c','NOT_STARTED':'#95a5a6','ON_HOLD':'#9b59b6','REVIEW':'#3498db'};
    sel.append('circle').attr('cx',-nW/2+10).attr('cy',-nH/2+10).attr('r',4).attr('fill',sc[d.status]||'#95a5a6').attr('stroke','white').attr('stroke-width',1.5);
    
    // Label
    const fs=Math.min(getLvlFS(d.level),12);
    sel.append('text').attr('text-anchor','middle').attr('y',d.part_number?-3:4).attr('font-size',fs+'px').attr('font-weight',getLvlFW(d.level)).text(d.name?.length>18?d.name.slice(0,17)+'…':d.name);
    if(d.part_number)sel.append('text').attr('text-anchor','middle').attr('y',12).attr('font-size','7px').attr('fill','#888').text(d.part_number);
    
    // Sequence badge
    const seqDisp=d.sequence_tag||(d.sequence_num>0?String(d.sequence_num):null);
    if(seqDisp&&S.showSeq)sel.append('text').attr('x',nW/2+8).attr('y',-nH/2+4).attr('font-size','12px').attr('font-weight','900').attr('fill','#333').text(seqDisp);
    
    // Qty badge
    if(d.qty>1){
      sel.append('rect').attr('x',-nW/2+2).attr('y',nH/2-12).attr('width',22).attr('height',12).attr('rx',6).attr('fill','#e74c3c').attr('stroke','white').attr('stroke-width',1);
      sel.append('text').attr('x',-nW/2+13).attr('y',nH/2-2).attr('text-anchor','middle').attr('fill','white').attr('font-size','8px').attr('font-weight','700').text('×'+d.qty);
    }
    
    // Collapse indicator
    if(d.receivesFrom.length>0){
      const isCollapsed=S.collapsedNodes.has(d.id);
      sel.append('circle').attr('cx',nW/2+12).attr('cy',0).attr('r',7).attr('fill','white').attr('stroke','#ccc').attr('stroke-width',1).style('cursor','pointer')
        .on('click',e=>{e.stopPropagation();S.collapsedNodes.has(d.id)?S.collapsedNodes.delete(d.id):S.collapsedNodes.add(d.id);renderTree()});
      sel.append('text').attr('x',nW/2+12).attr('y',0).attr('text-anchor','middle').attr('dy','.35em').attr('font-size','10px').style('pointer-events','none').text(isCollapsed?'+':'−');
    }
  });
  
  // Drag (vertical, with children)
  if(S.isAdmin){
    const treeDrag=d3.drag()
      .subject((e,d)=>({x:d.treeX||d.x||0,y:d.treeY||d.y||0}))
      .on('start',(e,d)=>{
        S.isDragging=true;
        d._dragStartY=e.subject.y;
        d._children=getDescendants(d.id);
        d._initPos={};
        d._initPos[d.id]=d._dragStartY;
        d._children.forEach(cid=>{const cn=S.nodes.find(n=>n.id===cid);if(cn)d._initPos[cid]=cn.treeY||cn.y||0});
      })
      .on('drag',(e,d)=>{
        const dy=(e.y-d._dragStartY)*.25;
        const newY=d._dragStartY+dy;
        d.treeY=newY;d.tree_y=newY;
        d3.select(`[data-node-id="${d.id}"]`).attr('transform',`translate(${d.treeX||d.x},${newY})`);
        d._children.forEach(cid=>{
          const cn=S.nodes.find(n=>n.id===cid);
          if(cn){cn.treeY=d._initPos[cid]+dy;cn.tree_y=cn.treeY;
            d3.selectAll('.node').filter(n=>n.id===cid).attr('transform',`translate(${cn.treeX||cn.x},${cn.treeY})`)}
        });
        updateAllLinks();
      })
      .on('end',(e,d)=>{
        S.isDragging=false;
        delete d._dragStartY;delete d._children;delete d._initPos;
        markDirty();
      });
    nodeGs.call(treeDrag);
  }
  
  // Mark node IDs for drag lookup
  nodeGs.attr('data-node-id',d=>d.id);
  
  // Click + context
  nodeGs.style('cursor',d=>S.selectMode?'crosshair':'pointer')
    .on('click',(e,d)=>{
      e.stopPropagation();
      if(S.isDragging)return;
      if(S.selectMode){
        // Toggle selection
        if(S.selectedNodeIds.has(d.id))S.selectedNodeIds.delete(d.id);
        else S.selectedNodeIds.add(d.id);
        updateSelectionVisuals();
        updateSelBar();
        return;
      }
      showNab(d,e);
    })
    .on('contextmenu',(e,d)=>{if(!S.isAdmin)return;e.preventDefault();showNodeCtx(e.clientX,e.clientY,d)});
  
  // Click background to deselect
  svg.on('click',()=>{hideNab();closePanel();if(S.selectMode){S.selectedNodeIds.clear();updateSelectionVisuals();updateSelBar()}});
  
  // Apply existing selection visuals after render
  if(S.selectMode)updateSelectionVisuals();
  
  // Legend
  const legendEl=document.getElementById('legend');
  const maxLvl=Math.max(...S.nodes.map(n=>n.level));
  let lHtml='';
  for(let i=1;i<=maxLvl;i++)lHtml+=`<div class="legend-item"><div class="legend-swatch" style="background:${getLvlColor(i)}"></div>L${i}</div>`;
  lHtml+=`<div class="legend-item" style="font-weight:700">| ${S.nodes.length} nodes</div>`;
  legendEl.innerHTML=lHtml;legendEl.style.display='flex';
  
  doFit(true);
}

// ============================================================
// SHAPE DRAWING
// ============================================================
function drawShape(sel,shape,w,h,fill){
  const hw=w/2,hh=h/2;
  const stroke=darken(fill,35);
  const sw=1.5;
  const shapes={
    stadium:()=>sel.insert('rect',':first-child').attr('x',-hw).attr('y',-hh).attr('width',w).attr('height',h).attr('rx',hh).attr('ry',hh).attr('fill',fill).attr('stroke',stroke).attr('stroke-width',sw),
    octagon:()=>{const c=Math.min(hw,hh)*.35;sel.insert('polygon',':first-child').attr('points',`${-hw+c},${-hh} ${hw-c},${-hh} ${hw},${-hh+c} ${hw},${hh-c} ${hw-c},${hh} ${-hw+c},${hh} ${-hw},${hh-c} ${-hw},${-hh+c}`).attr('fill',fill).attr('stroke',stroke).attr('stroke-width',sw)},
    hexagon:()=>sel.insert('polygon',':first-child').attr('points',`${-hw+10},${-hh} ${hw-10},${-hh} ${hw},0 ${hw-10},${hh} ${-hw+10},${hh} ${-hw},0`).attr('fill',fill).attr('stroke',stroke).attr('stroke-width',sw),
    pentagon:()=>{const a=(2*Math.PI)/5,sa=-Math.PI/2;const pts=Array.from({length:5},(_,i)=>`${hw*.85*Math.cos(sa+i*a)},${hh*.9*Math.sin(sa+i*a)}`).join(' ');sel.insert('polygon',':first-child').attr('points',pts).attr('fill',fill).attr('stroke',stroke).attr('stroke-width',sw)},
    diamond:()=>sel.insert('polygon',':first-child').attr('points',`0,${-hh} ${hw},0 0,${hh} ${-hw},0`).attr('fill',fill).attr('stroke',stroke).attr('stroke-width',sw),
    rounded_rectangle:()=>sel.insert('rect',':first-child').attr('x',-hw).attr('y',-hh).attr('width',w).attr('height',h).attr('rx',6).attr('fill',fill).attr('stroke',stroke).attr('stroke-width',sw),
    rectangle:()=>sel.insert('rect',':first-child').attr('x',-hw).attr('y',-hh).attr('width',w).attr('height',h).attr('fill',fill).attr('stroke',stroke).attr('stroke-width',sw),
    parallelogram:()=>{const sk=10;sel.insert('polygon',':first-child').attr('points',`${-hw+sk},${-hh} ${hw+sk},${-hh} ${hw-sk},${hh} ${-hw-sk},${hh}`).attr('fill',fill).attr('stroke',stroke).attr('stroke-width',sw)}
  };
  (shapes[shape]||shapes.rounded_rectangle)();
}

// ============================================================
// TREE HELPERS
// ============================================================
function isNodeVisible(node){
  if(node.goesInto.length===0)return true;
  return!hasCollapsedAncestor(node.id,new Set());
}
function hasCollapsedAncestor(nid,visited){
  if(visited.has(nid))return false;visited.add(nid);
  const n=S.nodes.find(x=>x.id===nid);if(!n)return false;
  for(const pid of n.goesInto){if(S.collapsedNodes.has(pid))return true;if(hasCollapsedAncestor(pid,visited))return true}
  return false;
}

function getDescendants(nid){
  const desc=[],visited=new Set();
  const ptc={};
  S.links.forEach(l=>{if(!ptc[l.parent_id])ptc[l.parent_id]=[];ptc[l.parent_id].push(l.child_id)});
  const q=[...(ptc[nid]||[])];
  while(q.length){const c=q.shift();if(visited.has(c))continue;visited.add(c);desc.push(c);(ptc[c]||[]).forEach(gc=>{if(!visited.has(gc))q.push(gc)})}
  return desc;
}

function updateAllLinks(){
  d3.selectAll('.link-group').each(function(){
    const lg=d3.select(this);
    const srcId=lg.attr('data-src'),tgtId=lg.attr('data-tgt');
    const src=S.nodes.find(n=>n.id===srcId),tgt=S.nodes.find(n=>n.id===tgtId);
    if(!src||!tgt)return;
    const sx=(src.treeX||src.x)+(src.treeWidth||60)/2,sy=src.treeY||src.y;
    const tx=(tgt.treeX||tgt.x)-(tgt.treeWidth||60)/2,ty=tgt.treeY||tgt.y;
    const midX=(sx+tx)/2;
    lg.select('.link-path').attr('d',`M${sx},${sy} C${midX},${sy} ${midX},${ty} ${tx},${ty}`);
    const fl=lg.select('.fast-label');
    if(fl.node()){
      const pathNode=lg.select('.link-path').node();
      const t=.5,pt=pathNode.getPointAtLength(t*pathNode.getTotalLength());
      fl.attr('transform',`translate(${pt.x},${pt.y})`);
    }
  });
}

function doZoomIn(){d3.select('#treeSvg').transition().duration(200).call(_zoomBehavior.scaleBy,1.3)}
function doZoomOut(){d3.select('#treeSvg').transition().duration(200).call(_zoomBehavior.scaleBy,.7)}
function doFit(instant){
  if(!_zoomBehavior||!S.nodes.length)return;
  const cont=document.getElementById('treeContainer');
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  S.nodes.forEach(n=>{if(n.deleted)return;const nx=n.treeX||n.x||400,ny=n.treeY||n.y||300;minX=Math.min(minX,nx-80);maxX=Math.max(maxX,nx+80);minY=Math.min(minY,ny-40);maxY=Math.max(maxY,ny+40)});
  const cw=maxX-minX,ch=maxY-minY;
  const scale=Math.min(cont.clientWidth/cw,cont.clientHeight/ch,1.5)*.9;
  const cx=(minX+maxX)/2,cy=(minY+maxY)/2;
  const t=d3.zoomIdentity.translate(cont.clientWidth/2-cx*scale,cont.clientHeight/2-cy*scale).scale(scale);
  const svg=d3.select('#treeSvg');
  if(instant)svg.call(_zoomBehavior.transform,t);
  else svg.transition().duration(400).call(_zoomBehavior.transform,t);
}

function openBOM(){
  if(!S.nodes.length){toast('No nodes','err');return}
  document.getElementById('bomTitle').textContent=(S.currentAssembly?.name||'Assembly')+' v'+(S.currentVersion?.version||'?');
  
  // Build BOM: group by L2 parent
  const l2Nodes=S.nodes.filter(n=>n.level===2).sort((a,b)=>(a.sequence_num||9999)-(b.sequence_num||9999));
  const ptc={};
  S.links.forEach(l=>{if(!ptc[l.parent_id])ptc[l.parent_id]=[];ptc[l.parent_id].push(l)});
  
  let html='<table class="bom-table"><thead><tr><th>#</th><th>Name</th><th>P/N</th><th>Qty</th><th>Fastener</th><th>Loctite</th><th>Torque</th></tr></thead><tbody>';
  let idx=1;
  
  function addBomGroup(parentNode, indent){
    const children=ptc[parentNode.id]||[];
    children.forEach(link=>{
      const child=S.nodes.find(n=>n.id===link.child_id);
      if(!child)return;
      html+=`<tr><td>${idx++}</td><td style="padding-left:${indent*16}px">${esc(child.name)}</td><td class="mono" style="font-size:10px">${esc(child.part_number||'')}</td><td>${child.qty||1}</td>
        <td class="mono" style="font-size:10px">${esc(link.fastener||'')}</td><td>${esc(link.loctite||'')}</td><td>${link.torque_value?link.torque_value+(link.torque_unit||'Nm'):''}</td></tr>`;
      addBomGroup(child,indent+1);
    });
  }
  
  if(l2Nodes.length){
    l2Nodes.forEach(l2=>{
      html+=`<tr class="bom-grp-row"><td colspan="7" style="padding:8px 10px">${esc(l2.name)}</td></tr>`;
      addBomGroup(l2,1);
    });
  }else{
    const roots=S.nodes.filter(n=>n.goesInto.length===0);
    roots.forEach(r=>addBomGroup(r,0));
  }
  
  html+='</tbody></table>';
  document.getElementById('bomBody').innerHTML=html;
  document.getElementById('bomOverlay').classList.add('show');
}
function closeBOM(){document.getElementById('bomOverlay').classList.remove('show')}

  showModal('Add Root Node',`
    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="mRootName" placeholder="Root node name"></div>
    <div class="form-group"><label class="form-label">Part Number (optional)</label><input class="form-input" id="mRootPN" placeholder="Part number"></div>

async function deleteOrphanNodes(){
  const orphans=S.nodes.filter(n=>n.goesInto.length===0&&n.receivesFrom.length===0);
  if(orphans.length<=1)return; // Keep at least one root if it's the only node
  
  // Exclude the actual root node (the one with most descendants or the one at highest level)
  const root=S.nodes.find(n=>n.goesInto.length===0&&n.receivesFrom.length>0);
  const toDelete=root?orphans.filter(n=>n.id!==root.id):orphans.slice(1); // Keep first one as root
  
  if(!confirm('Delete '+toDelete.length+' orphan nodes? These are nodes with no connections.'))return;
  
  try{
    toast('Deleting '+toDelete.length+' orphans...');
    // Hard delete - fast bulk
    const ids=toDelete.map(n=>n.id);
    // Delete any links referencing these nodes first
    for(const id of ids){
      await sb.from('logi_links').delete().or(`parent_id.eq.${id},child_id.eq.${id}`);
    }
    // Delete nodes
    await sb.from('logi_nodes').delete().in('id',ids);
    toast(toDelete.length+' orphan nodes deleted');
    await loadTreeData();
  }catch(e){toast(e.message,'err')}
}

function handleCSVFiles(event){
  const files=Array.from(event.target.files);
  if(!files.length)return;
  event.target.value=''; // Reset so same file can be re-selected
  
  const parsed=[];let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const result=parseCSV(e.target.result,file.name);
      if(result.error){toast(file.name+': '+result.error,'err')}
      else{result.fileName=file.name;parsed.push(result)}
      loaded++;
      if(loaded===files.length&&parsed.length>0)showImportPreview(parsed);
    };
    reader.readAsText(file);
  });
}

function parseCSV(text,fileName){
  // Strip BOM and normalize line endings
  text=text.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines=text.trim().split('\n');
  if(lines.length<2)return{error:'CSV must have header + at least one data row'};
  
  const header=parseCSVLine(lines[0]).map(h=>h.toLowerCase().trim());
  console.log('[CSV] Header columns:',header);
  
  // Detect format: BOM/Level format vs child/parent format
  const levelIdx=header.findIndex(h=>h==='level');
  const compIdx=header.findIndex(h=>h==='component'||h==='name'||h==='child'||h==='child_name');
  const parentIdx=header.findIndex(h=>h==='parent'||h==='parent_name');
  
  console.log('[CSV] Format detection: levelIdx='+levelIdx+' compIdx='+compIdx+' parentIdx='+parentIdx+' → '+(levelIdx!==-1?'BOM/Level':'child/parent'));
  
  if(compIdx===-1)return{error:'CSV needs a "component", "child", or "name" column'};
  
  const pnIdx=header.findIndex(h=>h==='part number'||h==='part_number'||h==='child_pn'||h==='pn');
  const qtyIdx=header.findIndex(h=>h==='qty'||h==='quantity');
  const fastIdx=header.findIndex(h=>h==='fastener');
  const fqIdx=header.findIndex(h=>h==='f.qty'||h==='fqty'||h==='fastener_qty');
  const ltIdx=header.findIndex(h=>h==='loctite'||h==='lt');
  const tqIdx=header.findIndex(h=>h==='torque'||h==='torque_value');
  
  // ── BOM/LEVEL FORMAT (Axon export) ──
  // Hierarchy from Level column: L1 root, L2 child of L1, L3 child of nearest L2 above, etc.
  if(levelIdx!==-1){
    const nodeMap=new Map(),links=[];
    const parentStack={}; // level -> most recent node name at that level
    let dupeCounter={}; // handle duplicate names by appending suffix
    
    for(let i=1;i<lines.length;i++){
      const vals=parseCSVLine(lines[i]);
      if(!vals.length||vals.every(v=>!v.trim()))continue;
      
      let name=(vals[compIdx]||'').trim();
      if(!name)continue;
      const levelStr=(vals[levelIdx]||'').trim().replace(/^L/i,'');
      const level=parseInt(levelStr)||1;
      const pn=pnIdx!==-1?(vals[pnIdx]||'').trim():'';
      const qty=qtyIdx!==-1?parseInt(vals[qtyIdx])||1:1;
      const fast=fastIdx!==-1?(vals[fastIdx]||'').trim():'';
      const fq=fqIdx!==-1?parseInt(vals[fqIdx])||1:1;
      const lt=ltIdx!==-1?(vals[ltIdx]||'').replace(/^LT-/i,'').trim():'';
      const tq=tqIdx!==-1?parseFloat(vals[tqIdx])||null:null;
      
      // Handle duplicate component names — append suffix to make unique
      if(nodeMap.has(name)){
        if(!dupeCounter[name])dupeCounter[name]=1;
        dupeCounter[name]++;
        name=name+' ('+dupeCounter[name]+')';
      }
      
      nodeMap.set(name,{name,pn:pn||null,qty});
      parentStack[level]=name;
      
      // Find parent: nearest node at level-1 above this row
      if(level>1){
        const parentName=parentStack[level-1];
        if(parentName){
          links.push({
            parent_name:parentName, child_name:name,
            fastener:fast||null, qty:fq, 
            loctite:lt||null, torque_value:tq, torque_unit:tq?'Nm':null
          });
        }
      }
      
      // Clear deeper levels (they're no longer valid parents)
      Object.keys(parentStack).forEach(k=>{if(parseInt(k)>level)delete parentStack[k]});
    }
    
    const nodes=Array.from(nodeMap.values());
    const childNames=new Set(links.map(l=>l.child_name));
    const rootNodes=nodes.filter(n=>!childNames.has(n.name));
    console.log('[CSV Parse] BOM format: '+nodes.length+' nodes, '+links.length+' links, '+rootNodes.length+' roots');
    console.log('[CSV Parse] idMap keys sample:',nodes.slice(0,5).map(n=>'"'+n.name+'"').join(', '));
    console.log('[CSV Parse] Link samples:',links.slice(0,5).map(l=>'"'+l.child_name+'" → "'+l.parent_name+'"').join(' | '));
    return{nodes,links,rootNodes};
  }
  
  // ── CHILD/PARENT FORMAT ──
  const nodeMap=new Map(),links=[];
  for(let i=1;i<lines.length;i++){
    const vals=parseCSVLine(lines[i]);
    if(!vals.length||vals.every(v=>!v.trim()))continue;
    const child=(vals[compIdx]||'').trim();
    const parent=parentIdx!==-1?(vals[parentIdx]||'').trim():'';
    if(!child)continue;
    
    const pn=pnIdx!==-1?(vals[pnIdx]||'').trim():'';
    const fast=fastIdx!==-1?(vals[fastIdx]||'').trim():'';
    const qty=qtyIdx!==-1?parseInt(vals[qtyIdx])||1:1;
    const lt=ltIdx!==-1?(vals[ltIdx]||'').trim():'';
    const tq=tqIdx!==-1?parseFloat(vals[tqIdx])||null:null;
    
    if(!nodeMap.has(child))nodeMap.set(child,{name:child,pn:pn||null});
    else if(pn&&!nodeMap.get(child).pn)nodeMap.get(child).pn=pn;
    if(parent&&!nodeMap.has(parent))nodeMap.set(parent,{name:parent,pn:null});
    
    if(parent)links.push({parent_name:parent,child_name:child,fastener:fast||null,qty,loctite:lt||null,torque_value:tq,torque_unit:tq?'Nm':null});
  }
  
  const nodes=Array.from(nodeMap.values());
  const childNames=new Set(links.map(l=>l.child_name));
  const rootNodes=nodes.filter(n=>!childNames.has(n.name));
  return{nodes,links,rootNodes};
}

function parseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"')inQ=!inQ;
    else if(c===','&&!inQ){result.push(cur);cur=''}
    else cur+=c;
  }
  result.push(cur);
  return result.map(v=>v.trim().replace(/^"|"$/g,''));
}

function showImportPreview(parsedFiles){

  const totalLinks=parsedFiles.reduce((s,p)=>s+p.links.length,0);

  const parentOpts=existingNodes.map(n=>`<option value="${n.id}">L${n.level} — ${esc(n.name)}</option>`).join('');
  
  const fileList=parsedFiles.map((p,i)=>`
    <div style="padding:6px 10px;background:${i%2===0?'var(--card2)':'var(--card)'};border-radius:4px;margin-bottom:3px;display:flex;justify-content:space-between">

      <span style="font-size:10px;color:var(--muted)">${p.nodes.length} nodes, ${p.links.length} links · Root: ${p.rootNodes.map(n=>n.name).join(', ')}</span>
    </div>
  `).join('');
  
  showModal('Import CSV',`
    <div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;margin-bottom:6px">📊 ${parsedFiles.length} file(s) — ${totalNodes} nodes, ${totalLinks} links</div>
      ${fileList}
    </div>
    
    ${existingNodes.length?`
    <div style="padding:10px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:8px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;margin-bottom:6px">🔗 Attach to existing node</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px">Root nodes from CSV will become children of the selected parent.</div>
      <select class="form-select" id="mImportParent" style="margin-bottom:6px">
        <option value="">— Don't attach (standalone) —</option>
        ${parentOpts}
      </select>
      <div class="form-group" style="margin-bottom:0"><label class="form-label">Attachment fastener (optional)</label>
        <input class="form-input" id="mImportFastener" placeholder="e.g. M6x20, CBE8-35">
      </div>
    </div>
    `:''}
    
    <div style="padding:8px 10px;background:var(--card2);border-radius:6px">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px">
        <input type="checkbox" id="mImportMerge">
        <span><strong>Merge</strong> — reuse existing nodes with same name</span>
      </label>
      <div style="font-size:9px;color:var(--muted);margin:3px 0 0 22px">OFF = each CSV imports as standalone sub-tree (recommended). ON = matches existing node names.</div>
    </div>
    
    <div style="margin-top:10px;font-size:9px;color:var(--dim)">
      CSV formats: <code>#,Level,Component,Part Number,Qty,...</code> (BOM) or <code>child,parent,...</code><br>
      ${totalLinks===0?'<span style="color:#ef4444;font-weight:700">⚠️ 0 links detected — tree hierarchy will not be created. Check CSV has Level or parent column.</span>':''}
    </div>
  `,[
    {label:'Cancel',cls:'btn-secondary',action:hideModal},
    {label:'Import '+totalNodes+' Nodes + '+totalLinks+' Links',action:()=>performImport(parsedFiles)}
  ]);
}

async function performImport(parsedFiles){
  const attachParentEl=document.getElementById('mImportParent');
  const attachFastEl=document.getElementById('mImportFastener');
  const mergeEl=document.getElementById('mImportMerge');
  const attachParentId=attachParentEl?attachParentEl.value:'';
  const attachFastener=attachFastEl?attachFastEl.value.trim():'';
  const mergeEnabled=mergeEl?mergeEl.checked:false;
  
  hideModal();
  toast('Importing...','info');
  
  if(!S.currentVersion||!S.currentAssembly){toast('No version selected','err');return}
  const assemblyId=S.currentAssembly.id;
  const versionId=S.currentVersion.id;
  let totalNodes=0,totalLinks=0;
  
  try{
    for(const parsed of parsedFiles){
      const{nodes,links,rootNodes}=parsed;
      console.log('[Import] File: '+(parsed.fileName||'csv')+' — '+nodes.length+' nodes, '+links.length+' links parsed');
      
      const idMap=new Map(); // CSV name → Supabase UUID
      const existingNameMap=new Map();
      if(mergeEnabled){
        S.nodes.forEach(n=>existingNameMap.set(n.name.toLowerCase(),n.id));
      }
      
      // Calculate positions
      const positions=calcImportLayout(nodes,links);
      
      // Build node insert array (preserving name order)
      const nodeNames=[]; // parallel array to track which name maps to which insert
      const nodeInserts=[];
      nodes.forEach((node,index)=>{
        const existingId=existingNameMap.get(node.name.toLowerCase());
        if(existingId){idMap.set(node.name,existingId);return}
        
        const pos=positions.get(node.name)||{x:200+(index%5)*180,y:100+Math.floor(index/5)*140};
        nodeNames.push(node.name);
        nodeInserts.push({
          assembly_id:assemblyId,version_id:versionId,
          name:node.name,part_number:node.pn||null,qty:node.qty||1,
          x:pos.x,y:pos.y,status:'NOT_STARTED',deleted:false
        });
      });
      
      // BATCH INSERT all nodes at once
      console.log('[Import] Inserting '+nodeInserts.length+' nodes in batch...');
      const createdNodes=await DB.bulkCreateNodes(nodeInserts);
      console.log('[Import] Supabase returned '+createdNodes.length+' nodes');
      
      // Map names to IDs — match by array order (Supabase returns in insertion order)
      createdNodes.forEach((created,i)=>{
        if(i<nodeNames.length) idMap.set(nodeNames[i],created.id);
      });
      
      // Fallback: if order isn't guaranteed, also match by name
      createdNodes.forEach(created=>{
        if(!idMap.has(created.name)) idMap.set(created.name,created.id);
      });
      
      console.log('[Import] idMap has '+idMap.size+' entries ('+nodeNames.length+' new + '+(idMap.size-nodeNames.length)+' existing)');
      
      // Build links
      const linkInserts=[];
      let linksSkipped=0;
      links.forEach((l,i)=>{
        const pid=idMap.get(l.parent_name);
        const cid=idMap.get(l.child_name);
        if(!pid||!cid){
          linksSkipped++;
          if(linksSkipped<=10)console.warn('[Import] Link skipped: "'+l.child_name+'"→"'+l.parent_name+'" parent='+(pid?'✓':'✗')+' child='+(cid?'✓':'✗'));
          return;
        }
        linkInserts.push({
          assembly_id:assemblyId,version_id:versionId,
          parent_id:pid,child_id:cid,
          fastener:l.fastener||null,qty:l.qty||1,
          loctite:l.loctite||null,torque_value:l.torque_value||null,
          torque_unit:l.torque_unit||null,deleted:false
        });
      });
      
      // Attachment links
      if(attachParentId){
        rootNodes.forEach(rn=>{
          const rid=idMap.get(rn.name);
          if(rid)linkInserts.push({
            assembly_id:assemblyId,version_id:versionId,
            parent_id:attachParentId,child_id:rid,
            fastener:attachFastener||null,qty:1,deleted:false
          });
        });
      }
      
      // BATCH INSERT all links at once
      console.log('[Import] Inserting '+linkInserts.length+' links in batch ('+linksSkipped+' skipped)...');
      if(linkInserts.length>0){
        const createdLinks=await DB.bulkCreateLinks(linkInserts);
        console.log('[Import] Supabase returned '+createdLinks.length+' links');
        totalLinks+=createdLinks.length;
      }
      
      totalNodes+=createdNodes.length;
    }
    
    toast(`Imported ${totalNodes} nodes, ${totalLinks} links`);
    console.log('[Import] DONE: '+totalNodes+' nodes, '+totalLinks+' links');
    await loadTreeData();
  }catch(e){
    console.error('[Import] FATAL:',e);
    toast('Import failed: '+e.message,'err');
  }
}

function calcImportLayout(nodes,links){
  const positions=new Map();
  const children=new Map(),parents=new Map();
  links.forEach(l=>{
    if(!children.has(l.parent_name))children.set(l.parent_name,[]);
    children.get(l.parent_name).push(l.child_name);
    parents.set(l.child_name,l.parent_name);
  });
  
  const rootNames=nodes.filter(n=>!parents.has(n.name)).map(n=>n.name);
  const levels=new Map();
  const queue=[...rootNames];
  rootNames.forEach(r=>levels.set(r,0));
  while(queue.length){
    const cur=queue.shift();
    const cl=levels.get(cur);
    (children.get(cur)||[]).forEach(ch=>{
      if(!levels.has(ch)){levels.set(ch,cl+1);queue.push(ch)}
    });
  }
  
  const levelNodes=new Map();
  nodes.forEach(n=>{const l=levels.get(n.name)||0;if(!levelNodes.has(l))levelNodes.set(l,[]);levelNodes.get(l).push(n.name)});
  
  const lH=140,nS=180,sX=100,sY=80;
  levelNodes.forEach((names,level)=>{
    const tw=(names.length-1)*nS;
    const ox=sX+(level===0?tw/2:0);
    names.forEach((name,i)=>positions.set(name,{x:ox+i*nS,y:sY+level*lH}));
  });
  return positions;
}

// CSV EXPORT — Download current tree as CSV
// ============================================================
function exportCSV(){
  if(!S.nodes.length){toast('No nodes to export','err');return}
  
  // Build parent→children map
  const ptc={};
  S.links.forEach(l=>{
    if(!ptc[l.parent_id])ptc[l.parent_id]=[];
    ptc[l.parent_id].push(l);
  });
  
  // BOM Level format (matches Axon import/export)
  let csv='#,Level,Component,Part Number,Qty,Status,Fastener,F.Qty,Loctite,Torque\n';
  let idx=1;
  
  function addRow(node,level,link){
    const indent='  '.repeat(level-1);
    csv+=[
      idx++,
      'L'+level,
      csvVal(indent+node.name),
      csvVal(node.part_number||''),
      node.qty||1,
      node.status||'NOT_STARTED',
      csvVal(link?.fastener||''),
      link?.qty||'',
      link?.loctite?'LT-'+link.loctite:'',
      link?.torque_value||''
    ].join(',')+'\n';
    
    // Recurse into children
    const childLinks=ptc[node.id]||[];
    childLinks.forEach(cl=>{
      const childNode=S.nodes.find(n=>n.id===cl.child_id);
      if(childNode)addRow(childNode,level+1,cl);
    });
  }
  
  // Start from root nodes
  const roots=S.nodes.filter(n=>n.goesInto.length===0);
  roots.forEach(r=>addRow(r,1,null));
  
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(S.currentAssembly?.name||'assembly')+'_v'+(S.currentVersion?.version||'1')+'_BOM.csv';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('CSV exported');
}

function csvVal(s){
  if(!s)return'';
  if(s.includes(',')||s.includes('"')||s.includes('\n'))return'"'+s.replace(/"/g,'""')+'"';
  return s;
}
