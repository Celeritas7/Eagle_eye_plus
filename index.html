function toggleSelectMode(){
  S.selectMode=!S.selectMode;
  const btn=document.getElementById('selectToggle');
  btn.classList.toggle('active',S.selectMode);
  btn.textContent=S.selectMode?'☑ Select':'☐ Select';
  btn.style.background=S.selectMode?'rgba(245,158,11,.15)':'';
  btn.style.borderColor=S.selectMode?'rgba(245,158,11,.3)':'';
  btn.style.color=S.selectMode?'#f59e0b':'';
  document.body.classList.toggle('select-mode',S.selectMode);
  
  if(!S.selectMode){
    S.selectedNodeIds.clear();
    updateSelectionVisuals();
  }
  updateSelBar();
}

function updateSelBar(){
  const bar=document.getElementById('selBar');
  const count=S.selectedNodeIds.size;
  if(S.selectMode){
    bar.classList.add('show');
    document.getElementById('selBarCount').textContent=count+' selected';
  }else{
    bar.classList.remove('show');
  }
}

function updateSelectionVisuals(){
  d3.selectAll('.node').each(function(d){
    const el=d3.select(this);
    if(S.selectedNodeIds.has(d.id)){
      el.classed('node-selected',true);
      // Add selection ring if not present
      if(!el.select('.sel-ring').node()){
        const nW=d.treeWidth||d.width||120,nH=d.treeHeight||d.height||36;
        el.insert('rect',':first-child').attr('class','sel-ring')
          .attr('x',-nW/2-4).attr('y',-nH/2-4).attr('width',nW+8).attr('height',nH+8)
          .attr('rx',8).attr('fill','none').attr('stroke','#f59e0b').attr('stroke-width',2.5)
          .attr('stroke-dasharray','6,3').attr('opacity',.9);
      }
    }else{
      el.classed('node-selected',false);
      el.select('.sel-ring').remove();
    }
  });
}

function selectAll(){
  S.nodes.filter(n=>!n.deleted).forEach(n=>S.selectedNodeIds.add(n.id));
  updateSelectionVisuals();updateSelBar();
  toast(S.selectedNodeIds.size+' nodes selected','info');
}

function clearSelection(){
  S.selectedNodeIds.clear();
  updateSelectionVisuals();updateSelBar();
}

function invertSelection(){
  S.nodes.filter(n=>!n.deleted).forEach(n=>{
    if(S.selectedNodeIds.has(n.id))S.selectedNodeIds.delete(n.id);
    else S.selectedNodeIds.add(n.id);
  });
  updateSelectionVisuals();updateSelBar();
  toast(S.selectedNodeIds.size+' nodes selected','info');
}

function selectAllOrphans(){
  const orphans=S.nodes.filter(n=>n.goesInto.length===0&&n.receivesFrom.length===0);
  orphans.forEach(n=>S.selectedNodeIds.add(n.id));
  updateSelectionVisuals();updateSelBar();
  toast(orphans.length+' orphans selected','info');
}

function selectByLevel(){
  const maxLvl=Math.max(...S.nodes.map(n=>n.level));
  const levels=[];for(let i=1;i<=maxLvl;i++)levels.push(i);
  
  showModal('Select by Level',`
    <div class="form-group"><label class="form-label">Select all nodes at level:</label>
      <select class="form-select" id="mSelLevel">
        ${levels.map(l=>{
          const cnt=S.nodes.filter(n=>n.level===l).length;
          return`<option value="${l}">L${l} (${cnt} nodes)</option>`;
        }).join('')}
      </select>
    </div>
  `,[
    {label:'Cancel',cls:'btn-secondary',action:hideModal},
    {label:'Select',action:()=>{
      const lvl=parseInt(document.getElementById('mSelLevel').value);
      S.nodes.filter(n=>n.level===lvl).forEach(n=>S.selectedNodeIds.add(n.id));
      hideModal();updateSelectionVisuals();updateSelBar();
      toast('L'+lvl+' nodes selected','info');
    }}
  ]);
}

async function deleteSelected(){
  const count=S.selectedNodeIds.size;
  if(!count){toast('Nothing selected','err');return}
  if(!confirm('Delete '+count+' selected nodes and all their links? This cannot be undone.'))return;
  
  try{
    toast('Deleting '+count+' nodes...','info');
    const ids=[...S.selectedNodeIds];
    // Bulk delete links referencing these nodes
    for(const id of ids){
      await sb.from('logi_links').delete().or(`parent_id.eq.${id},child_id.eq.${id}`);
    }
    // Bulk delete nodes
    await sb.from('logi_nodes').delete().in('id',ids);
    S.selectedNodeIds.clear();
    toast(count+' nodes deleted');
    await loadTreeData();
  }catch(e){toast(e.message,'err')}
}
